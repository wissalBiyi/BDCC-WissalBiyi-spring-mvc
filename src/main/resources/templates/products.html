<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="layout1"


>
<head>
    <meta charset="UTF-8">
    <title>Products</title>

</head>
<body>
<div class="p-3" layout:fragment="content1">
    <div class="p-3" sec:authorize="hasRole('ADMIN') ">
        <a class="btn btn-primary" th:href="@{/admin/newProduct}">
        New Product
    </a>
    </div>
    <form method="get" th:action="@{/user/index}">
        <input type="text" name="keyword" th:value="${keyword}">
        <button class="btn btn-primary">Search</button>
    </form>


    <table class="table">
        <thead>
        <th>ID</th> <th>Name</th> <th>Price</th> <th>Quantity</th>
        </thead>
        <tbody>
        <tr th:each="p:${productList}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.quantity}"></td>
            <td sec:authorize="hasRole('ADMIN') ">
                <form  method="post" th:action="@{/admin/delete(id=${p.id})}">
                    <button type="submit" class="btn btn-danger "> Delete</button>
                </form>

            </td>
            <td sec:authorize="hasRole('ADMIN')">
                <a class="btn btn-warning"
                   th:href="@{/admin/editProduct(id=${p.id})}">
                    Edit
                </a>
            </td>

        </tr>

        </tbody>
    </table>
    <ul class="nav nav-pills">
        <li th:each="page,status:${pages}">
            <a th:class="${status.index==currentPage?'btn btn-info ms-1':'btn btn-outline-info ms-1'}"
               th:href="@{/user/index(page=${status.index},keyword=${keyword})}"
               th:text="${status.index}">
            </a>
        </li>
    </ul>
</div>

</body>
</html>
